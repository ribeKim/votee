services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-votee}
      POSTGRES_USER: ${POSTGRES_USER:-votee}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-votee}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-votee} -d ${POSTGRES_DB:-votee}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: "${VOTEE_GIT_REPO:-https://github.com/ribeKim/votee.git}#${VOTEE_GIT_REF:-main}:backend"
      dockerfile: Dockerfile
      pull: true
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: "${VOTEE_GIT_REPO:-https://github.com/ribeKim/votee.git}#${VOTEE_GIT_REF:-main}:frontend"
      dockerfile: Dockerfile
      pull: true
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "4173:80"

volumes:
  backend_uploads:
  postgres_data:
  redis_data:
