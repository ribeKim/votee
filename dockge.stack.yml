services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-votee}
      POSTGRES_USER: ${POSTGRES_USER:-votee}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-votee}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-votee} -d ${POSTGRES_DB:-votee}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: "${VOTEE_GIT_REPO:-https://github.com/ribeKim/votee.git}#${VOTEE_GIT_REF:-main}:backend"
      dockerfile: Dockerfile
      pull: true
    restart: unless-stopped
    environment:
      VOTEE_DATABASE_URL: "${VOTEE_DATABASE_URL:-postgresql+psycopg://votee:votee@db:5432/votee}"
      VOTEE_REDIS_URL: "${VOTEE_REDIS_URL:-redis://redis:6379/0}"
      VOTEE_SESSION_SECRET: "${VOTEE_SESSION_SECRET:-change-me}"
      VOTEE_COOKIE_SECURE: "${VOTEE_COOKIE_SECURE:-false}"
      VOTEE_SESSION_COOKIE_NAME: "${VOTEE_SESSION_COOKIE_NAME:-votee_session}"
      VOTEE_FRONTEND_URL: "${VOTEE_FRONTEND_URL:-http://localhost:4173}"
      VOTEE_PUBLIC_APP_URL: "${VOTEE_PUBLIC_APP_URL:-http://localhost:4173}"
      VOTEE_API_BASE_URL: "${VOTEE_API_BASE_URL:-http://localhost:8000}"
      VOTEE_DISCORD_CLIENT_ID: "${VOTEE_DISCORD_CLIENT_ID:-}"
      VOTEE_DISCORD_CLIENT_SECRET: "${VOTEE_DISCORD_CLIENT_SECRET:-}"
      VOTEE_DISCORD_REDIRECT_URI: "${VOTEE_DISCORD_REDIRECT_URI:-http://localhost:8000/api/auth/discord/callback}"
      VOTEE_DISCORD_ADMIN_IDS: "${VOTEE_DISCORD_ADMIN_IDS:-}"
      VOTEE_STORAGE_DRIVER: "${VOTEE_STORAGE_DRIVER:-local}"
      VOTEE_STORAGE_BUCKET: "${VOTEE_STORAGE_BUCKET:-votee}"
      VOTEE_STORAGE_PUBLIC_URL: "${VOTEE_STORAGE_PUBLIC_URL:-http://localhost:8000/uploads}"
      VOTEE_SUPABASE_URL: "${VOTEE_SUPABASE_URL:-}"
      VOTEE_SUPABASE_SERVICE_ROLE_KEY: "${VOTEE_SUPABASE_SERVICE_ROLE_KEY:-}"
      VOTEE_AI_PROVIDER: "${VOTEE_AI_PROVIDER:-template}"
      VOTEE_OPENAI_API_KEY: "${VOTEE_OPENAI_API_KEY:-}"
      VOTEE_OPENAI_MODEL: "${VOTEE_OPENAI_MODEL:-gpt-4.1-mini}"
      VOTEE_MAX_UPLOAD_BYTES: "${VOTEE_MAX_UPLOAD_BYTES:-5242880}"
      VOTEE_ALLOWED_IMAGE_TYPES: "${VOTEE_ALLOWED_IMAGE_TYPES:-image/png,image/jpeg,image/webp}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: "${VOTEE_GIT_REPO:-https://github.com/ribeKim/votee.git}#${VOTEE_GIT_REF:-main}:frontend"
      dockerfile: Dockerfile
      pull: true
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "4173:80"

volumes:
  backend_uploads:
  postgres_data:
  redis_data:
